<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Switch Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .status-ACTIVE { color: green; font-weight: bold; }
        .status-PENDING_PROOF { color: orange; font-weight: bold; }
        .status-RELEASED { color: red; font-weight: bold; }
        .back-link { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <h2>📋 Vault Status Panel</h2>
    <p>Showing active secure automated switches for: <strong th:text="${userEmail}">user@example.com</strong></p>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Interval (Mins)</th>
                <th>Last Check-In Time</th>
                <th>Current Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="secret : ${secrets}">
                <td th:text="${secret.title}">Title</td>
                <td th:text="${secret.intervalMinutes}">5</td>
                <td th:text="${secret.lastCheckIn}">2026-05-23 12:00</td>
                <td>
                    <span th:class="'status-' + ${secret.status}" th:text="${secret.status}">ACTIVE</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(secrets)}">
                <td colspan="4" style="text-align: center; color: #777;">No switches found for this email address.</td>
            </tr>
        </tbody>
    </table>

    <a href="/" class="back-link">← Go Back Home</a>
</body>
</html>
